services:
  backend:
    image: workteam-backend:latest
    container_name: workteam_backend
    ports:
      - "8001:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: workteam_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
