services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: workteam-backend:latest
    container_name: workteam_backend
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
      - UPLOAD_DIR=/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: workteam-frontend:latest
    container_name: workteam_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
